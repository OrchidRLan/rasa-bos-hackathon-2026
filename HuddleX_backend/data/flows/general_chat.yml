flows:
  pattern_chitchat:
    description: >
      Single entry point for ALL user messages: chitchat, corrections, searches,
      and anything the command generator cannot map to another flow. Every message
      is answered by the active expert persona via RAG + cognitive framework.
      We consolidate all patterns here to prevent multi-command dispatch from
      triggering action_persona_chat more than once per turn.
    steps:
      - action: action_persona_chat
