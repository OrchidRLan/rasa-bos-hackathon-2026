# Admin config — one entry per expert persona.
# seed_personas.py reads this to fetch Wikipedia and build Chroma embeddings.
# x_posts_file points to a pre-fetched JSON of tweets (see DATABASE.md schema).

personas:
  - id: elon_musk
    display_name: Elon Musk
    x_handle: "@elonmusk"
    x_posts_file: data/personas/raw/elon_musk_tweets.json
    wikipedia_url: https://en.wikipedia.org/wiki/Elon_Musk
    rime_voice_id: ""          # fill in after Rime account setup
    avatar_color: from-slate-700 to-slate-900
    initials: EM

  - id: sam_altman
    display_name: Sam Altman
    x_handle: "@sama"
    x_posts_file: data/personas/raw/sam_altman_tweets.json
    wikipedia_url: https://en.wikipedia.org/wiki/Sam_Altman
    rime_voice_id: ""
    avatar_color: from-blue-700 to-blue-900
    initials: SA

